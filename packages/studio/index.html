<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pxml Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.0/index.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.16.0/devicon.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.16.0/devicon.min.css" />
    <style>
      *,*::before,*::after{box-sizing:border-box}
      body{
        margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
        font-size:13px;overflow:hidden;background:#0a0a0a;color:#e5e5e5;
        -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
      }
      :root {
        --bg-0:#0a0a0a;
        --bg-1:#111111;
        --bg-2:#171717;
        --bg-3:#1c1c1c;
        --bg-4:#222222;
        --bg-hover:#1a1a1a;
        --bg-active:#262626;
        --border:#262626;
        --border-subtle:#1f1f1f;
        --border-muted:#171717;
        --text-1:#e5e5e5;
        --text-2:#a3a3a3;
        --text-3:#737373;
        --text-4:#525252;
        --accent:#3b82f6;
        --accent-hover:#2563eb;
        --accent-subtle:rgba(59,130,246,0.1);
        --success:#22c55e;
        --success-subtle:rgba(34,197,94,0.1);
        --warning:#eab308;
        --warning-subtle:rgba(234,179,8,0.1);
        --danger:#ef4444;
        --danger-subtle:rgba(239,68,68,0.1);
        --scrollbar:#262626;
        --scrollbar-hover:#404040;
        --radius:6px;
      }
      ::-webkit-scrollbar{width:6px;height:6px}
      ::-webkit-scrollbar-track{background:transparent}
      ::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
      ::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-hover)}
      ::-webkit-scrollbar-corner{background:transparent}
      input,select,textarea{
        font-family:'JetBrains Mono','Fira Code','Consolas',monospace;
        font-size:12px;background:var(--bg-0);color:var(--text-1);
        border:1px solid var(--border);border-radius:var(--radius);outline:none;
        transition:border-color 0.15s;
      }
      input:focus,select:focus,textarea:focus{
        border-color:var(--accent);
        box-shadow:0 0 0 2px var(--accent-subtle);
      }
      input::placeholder,textarea::placeholder{color:var(--text-4)}
      button{
        font-family:inherit;cursor:pointer;border:none;background:none;
        color:var(--text-1);font-size:12px;border-radius:var(--radius);
        transition:all 0.12s ease;
      }
      button:hover{opacity:0.85}
      button:disabled{opacity:0.3;cursor:default;pointer-events:none}
      select{padding:4px 8px;cursor:pointer}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
      @keyframes fadeIn{from{opacity:0;transform:scale(0.97) translateY(3px)}to{opacity:1;transform:scale(1) translateY(0)}}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/client/main.tsx"></script>
  </body>
</html>
